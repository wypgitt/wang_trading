; Supervisor program: wang_trade_idea_publisher
; FALLBACK trade-ideas snapshot publisher (Plane A).
;
; The PRIMARY path is now the live cycle's in-process post-cycle hook:
; PaperTradingPipeline.run_cycle publishes the snapshot from the artifacts it
; already computed each tick (TradeIdeaPublisher.publish_report) — so when
; wang_live_trading is running, trade ideas are computed exactly once and this
; daemon must NOT also run (it would re-run the whole pipeline and double-write
; the same file). Hence autostart=false.
;
; Start this ONLY when there is no live cycle running (e.g. paper-only viewing):
;   supervisorctl start wang_trade_idea_publisher
; It re-runs the read-only pipeline every --period seconds and atomically writes
; the tmpfs snapshot (write -> fsync -> os.replace). WANG_TRADE_IDEAS_PATH MUST
; match the BFF's (see bff.conf). The publisher mkdir's the parent, so /run/wang
; is recreated after a reboot and the snapshot returns within one period.

[program:wang_trade_idea_publisher]
command=/opt/wang_trading/venv/bin/python -m src.execution.trade_idea_publisher --period 60
directory=/opt/wang_trading
user=wang
group=wang
environment=
    PYTHONPATH="/opt/wang_trading",
    KMP_DUPLICATE_LIB_OK="TRUE",
    WANG_TRADE_IDEAS_PATH="/run/wang/trade_ideas.json"
; PRIMARY path is the live cycle's in-process hook — this is a manual fallback.
autostart=false
autorestart=true
startsecs=15
startretries=3
stopsignal=TERM
stopwaitsecs=30
stdout_logfile=/var/log/wang_trading/trade_idea_publisher.out.log
stderr_logfile=/var/log/wang_trading/trade_idea_publisher.err.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_maxbytes=50MB
stderr_logfile_backups=5
; After the engine + DB (priority 30) so the first publish has data to read.
priority=40
