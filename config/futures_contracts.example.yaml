# Futures contract specifications for IBKR live trading (P6.03).
#
# tick_size         – minimum price increment (in quote currency)
# multiplier        – dollar value per point per contract
# margin_requirement – initial margin per contract (USD)
# months            – active quarterly/serial contract-month codes
#                     (F=Jan G=Feb H=Mar J=Apr K=May M=Jun
#                      N=Jul Q=Aug U=Sep V=Oct X=Nov Z=Dec)
# session_hours.rth_start / rth_end – Regular Trading Hours (24-hour local)
# session_hours.timezone – IANA tz for the session_hours clock

ES:                       # E-mini S&P 500
  exchange: CME
  currency: USD
  tick_size: 0.25
  multiplier: 50
  margin_requirement: 13200
  months: [H, M, U, Z]
  session_hours:
    rth_start: "09:30"
    rth_end: "16:00"
    timezone: America/New_York

